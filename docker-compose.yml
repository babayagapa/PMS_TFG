version: '3.8'

services:

  mongo:
    image: mongo:6
    container_name: pms_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: pms_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - pms_net

  mongo-express:
    image: mongo-express
    container_name: pms_mongo_ui
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: secret
      ME_CONFIG_MONGODB_URL: mongodb://admin:secret@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    networks:
      - pms_net

  backend:
    build:
      context: ./pms-backend
      dockerfile: Dockerfile
    container_name: pms_backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    volumes:
      - ./pms-backend:/var/www/html
    environment:
      APP_NAME: PMS_TFG
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: mongodb
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DATABASE: pms_db
      MONGO_USERNAME: admin
      MONGO_PASSWORD: secret
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_TTL: 60
    networks:
      - pms_net

  frontend:
    build:
      context: ./pms-frontend
      dockerfile: Dockerfile
    container_name: pms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./pms-frontend:/app
    environment:
      VITE_API_URL: http://localhost:8000/api
    networks:
      - pms_net

networks:
  pms_net:
    driver: bridge

volumes:
  mongo_data: